name: Build

on: [push, pull_request]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15-intel is an Intel runner, macos-14 is Apple silicon
        #os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, windows-11-arm, macos-15-intel, macos-14]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0    # for setuptools_scm to work

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_SKIP: cp*-musllinux_*
          CIBW_BEFORE_ALL: >
            source {package}/.github/workflows/build-wheel.sh {project} ${{ matrix.os }} /tmp/prefix &&
            :
          CIBW_ENVIRONMENT: >
            GMP_ROOT=/tmp/prefix
            Z3_PREFIX=/tmp/prefix
            LD_LIBRARY_PATH=/tmp/prefix/lib
        # with:
        #   package-dir: .
        #   output-dir: wheelhouse
        #   config-file: "{package}/pyproject.toml"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
